# Dinosaur Island - Design System v1.0
# 恐龙岛设计系统 v1.0
# 
# 位置: docs/design-system.yaml
# 用途: 全项目设计参考规范
# 适用范围: 所有游戏内活动页面、H5 推广页、邀请系统
#
# 引用方式: [引用:docs/design-system.yaml]

metadata:
  name: "Dinosaur Island Design System"
  nameCN: "恐龙岛设计系统"
  version: "1.0.0"
  created: "2026-03-13"
  updated: "2026-03-13"
  scope: 
    - "in-game activity pages"
    - "H5 promotional pages"
    - "referral systems"
    - "reward dashboards"
    - "promotional landing pages"
  
# ============================================
# 1. 视觉风格 / Visual Style
# ============================================
visual_style:
  theme: "Prehistoric Jungle Gaming"
  themeCN: "史前丛林游戏风"
  description: "以恐龙世界为背景，营造神秘、冒险、奖励丰厚的游戏氛围"
  keywords:
    - "adventurous"
    - "mysterious"
    - "immersive"
    - "rewarding"
    - "prehistoric atmosphere"
    - "gold coin emphasis"
  
  # 背景设置 / Background
  background:
    type: "image"
    description: "霸王龙在雾气弥漫的丛林中，青绿色调，神秘氛围"
    overlay: "dark gradient from #0a1a15"
    attachment: "fixed"
    fallback_color: "#0a1a15"
    
  # 玻璃态卡片 / Glassmorphism Cards
  cards:
    style: "glass"
    background: "rgba(10, 30, 25, 0.85)"
    backdrop_blur: "12px"
    border: "1px solid rgba(74, 154, 138, 0.2)"
    border_radius: "12-16px"
    shadow: "0 8px 25px rgba(0, 0, 0, 0.4)"
    hover_shadow: "0 8px 25px rgba(0, 0, 0, 0.4)"
    
  # 装饰元素 / Decorative Elements
  decorations:
    pattern: "subtle dinosaur/palm leaf texture"
    pattern_opacity: "5%"
    glow_effects: "gold glow for rewards and CTAs"

# ============================================
# 2. 配色方案 / Color Palette
# ============================================
colors:
  # 主色调 / Primary
  primary:
    gold:
      DEFAULT: "#FFD700"
      dark: "#B8860B"
      light: "#FFE55C"
      usage: ["rewards", "coins", "CTAs", "active states", "highlight numbers"]
    
  # 丛林色系 / Jungle Theme
  jungle:
    900: "#0a1a15"    # 最深背景 - 主背景色
    800: "rgba(10, 30, 25, 0.85)"  # 卡片背景
    700: "rgba(15, 45, 38, 0.9)"   # 悬停状态
    600: "#1a4a3a"    # 强调色
    500: "rgba(30, 80, 65, 0.6)"   # 边框
    
  # 雾气色系 / Mist Accent
  mist:
    DEFAULT: "#4a9a8a"
    light: "#6abaaa"
    dark: "#2a6a5a"
    usage: ["secondary elements", "borders", "highlights", "accents"]
    
  # 状态色 / Status
  status:
    success: "#10b981"    # 已激活、完成 - emerald
    warning: "#f59e0b"    # 待激活、处理中 - amber
    error: "#ef4444"      # 失败、未激活 - red
    info: "#3b82f6"       # 提示、链接 - blue
    
  # 文字色 / Text
  text:
    primary: "#f1f5f9"    # 主文字 - slate-100
    secondary: "#94a3b8"  # 次要文字 - slate-400
    muted: "#64748b"      # 禁用状态 - slate-500
    
  # 对比度要求 / Contrast Requirements
  contrast:
    minimum: "4.5:1"
    current: "15.8:1"  # gold on jungle-900

# ============================================
# 3. 字体排版 / Typography
# ============================================
typography:
  # 字体家族 / Font Families
  families:
    display: 
      name: "Cinzel"
      usage: "headings, titles, brand text, large numbers"
      fallback: "serif"
      characteristics: "elegant, classic, gaming feel"
    body:
      name: "Inter"
      usage: "body text, UI elements, descriptions"
      fallback: "sans-serif"
      characteristics: "clean, modern, highly readable"
    mono:
      name: "JetBrains Mono"
      usage: "invite codes, numbers, technical text"
      fallback: "monospace"
      characteristics: "clear distinction between characters"
      
  # 标题样式 / Headings
  headings:
    h1: 
      size: "24-30px"
      weight: "700"
      font: "Cinzel"
      shadow: "0 2px 4px rgba(0,0,0,0.8), 0 0 20px rgba(0,0,0,0.5)"
      usage: "page titles"
    h2:
      size: "18-20px"
      weight: "600"
      font: "Inter"
      usage: "section headers"
    h3:
      size: "16-18px"
      weight: "600"
      font: "Inter"
      usage: "card titles, subsection headers"
      
  # 正文 / Body
  body:
    size: "14-15px"
    weight: "400-500"
    line_height: "1.5-1.75"
    color: "text-primary"
    
  # 特殊文字 / Special Text
  special:
    invite_code:
      font: "JetBrains Mono"
      letter_spacing: "3px"
      size: "20-24px"
      color: "gold"
      weight: "700"
    numbers:
      font: "Cinzel"
      weight: "700"
      color: "gold"
      glow: "0 0 20px rgba(255,215,0,0.5)"

# ============================================
# 4. 组件规范 / Components
# ============================================
components:
  # 按钮 / Buttons
  buttons:
    primary:
      background: "gradient from #FFD700 to #B8860B"
      text: "#0a1a15"  # dark for contrast
      height: "48-56px"
      radius: "24px (pill shape)"
      shadow: "0 4px 20px rgba(255,215,0,0.3)"
      hover: "brightness-110"
      active: "scale(0.98)"
      transition: "150ms ease"
      
    secondary:
      background: "transparent"
      border: "2px solid #FFD700"
      text: "#FFD700"
      hover: "bg-gold/10"
      
    disabled:
      background: "#1f2937"
      text: "#64748b"
      cursor: "not-allowed"
      
  # 输入框 / Inputs
  inputs:
    select:
      background: "jungle-700"
      border: "1px solid mist/30"
      radius: "12px"
      height: "48px"
      text: "text-primary"
      arrow: "gold chevron"
      focus: "border-gold"
      
  # 标签 / Badges
  badges:
    activated:
      bg: "rgba(16, 185, 129, 0.2)"  # emerald
      text: "#10b981"
      dot: "#10b981"
      radius: "9999px"
    pending:
      bg: "rgba(245, 158, 11, 0.2)"  # amber
      text: "#f59e0b"
      dot: "#f59e0b"
      radius: "9999px"
    reward:
      bg: "rgba(255, 215, 0, 0.2)"  # gold
      text: "#FFD700"
      
  # 头像 / Avatars
  avatars:
    style: "icon-based"
    icon: "fas fa-user"
    background: "gradient"
    colors: 
      - "emerald"
      - "amber"
      - "slate"
      - "stone"
    size: "40-48px"
    radius: "full"
    
  # 卡片 / Cards
  cards:
    glass:
      background: "rgba(10, 30, 25, 0.85)"
      backdrop_blur: "12px"
      border: "1px solid rgba(74, 154, 138, 0.2)"
      radius: "12-16px"
      padding: "16-20px"
      hover: "translateY(-2px), enhanced shadow"

# ============================================
# 5. 布局规范 / Layout
# ============================================
layout:
  # 容器 / Container
  container:
    max_width: "1200px"
    padding: 
      mobile: "16px"
      desktop: "24px"
    
  # 网格 / Grid
  grid:
    desktop: "420px + 1fr (sidebar + content)"
    tablet: "1fr 1fr"
    mobile: "1fr (stacked)"
    gap: "24px"
    
  # 间距 / Spacing
  spacing:
    section_gap: "16-24px"
    card_padding: "16-20px"
    element_gap: "12px"
    
  # 响应式断点 / Breakpoints
  breakpoints:
    mobile: "< 768px"
    tablet: "768px - 1024px"
    desktop: "> 1024px"
    
  # 导航 / Navigation
  nav:
    height: "56-64px"
    position: "sticky top-0"
    background: "jungle-800/90 with blur"
    z_index: "50"

# ============================================
# 6. 动效规范 / Animations
# ============================================
animations:
  # 微交互 / Micro-interactions
  buttons:
    hover: "translateY(-2px), shadow enhancement"
    active: "scale(0.98)"
    transition: "all 0.15s ease"
    
  # 卡片 / Cards
  cards:
    hover: "translateY(-2px), shadow-lg"
    transition: "all 0.25s ease"
    
  # 模态框 / Modals
  modals:
    mobile: 
      entry: "slide-up from bottom"
      duration: "300ms"
    desktop:
      entry: "fade-in center"
      duration: "200ms"
    easing: "ease-out"
    
  # 特殊效果 / Special Effects
  gold_glow:
    text_shadow: "0 0 20px rgba(255,215,0,0.5), 0 0 40px rgba(255,215,0,0.3)"
    box_shadow: "0 4px 20px rgba(255,215,0,0.3), 0 0 40px rgba(255,215,0,0.1)"
    
  float:
    animation: "float 3s ease-in-out infinite"
    keyframes:
      "0%, 100%": "translateY(0)"
      "50%": "translateY(-5px)"
      
  pulse_slow:
    animation: "pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite"

# ============================================
# 7. 文案规范 / Copywriting
# ============================================
copywriting:
  # 默认语言 / Default Language
  default_language: "vi (Vietnamese)"
  supported_languages: ["vi", "cn"]
  
  # 语气 / Tone
  tone:
    vi: "thân thiện, hào hứng, khuyến khích, gấp gáp (urgent)"
    cn: "友好、热情、鼓励性、紧迫感"
    en: "friendly, enthusiastic, encouraging, urgent"
    
  # 关键术语 / Key Terms
  terms:
    invite_code:
      vi: "Mã mời"
      cn: "邀请码"
    reward:
      vi: "Thưởng"
      cn: "奖励"
    gold:
      vi: "vàng"
      cn: "金币"
    activated:
      vi: "Đã kích hoạt"
      cn: "已激活"
    pending:
      vi: "Chờ kích hoạt"
      cn: "待激活"
    claim:
      vi: "Nhận"
      cn: "领取"
    server:
      vi: "Máy chủ"
      cn: "服务器"
      
  # 话术模板结构 / Message Template Structure
  message_templates:
    structure: "enthusiastic_hook + benefit + call_to_action + code"
    variables: 
      - "{{code}}"      # 邀请码
      - "{{reward}}"    # 奖励金额
      - "{{game}}"      # 游戏名称
    example_vi: "Nhanh tay tham gia {{game}}! Dùng mã mời {{code}} đăng ký, cả hai đều nhận {{reward}}!"
    example_cn: "快来加入{{game}}！用我的邀请码 {{code}} 注册，双方都能获得{{reward}}！"

# ============================================
# 8. 使用示例 / Usage Examples
# ============================================
examples:
  hero_card:
    description: "金币统计卡片 - 页面顶部核心数据展示"
    structure:
      - "glass card with gradient background"
      - "two-column layout for stats"
      - "gold numbers with glow effect"
      - "primary CTA button (pill shape)"
      
  player_list:
    description: "邀请好友列表 - 展示已邀请用户状态"
    structure:
      - "glass card container"
      - "filter tabs (all/activated/pending)"
      - "user icon avatars"
      - "status badges (emerald/amber)"
      - "gold reward text"
      
  server_modal:
    description: "服务器选择弹窗 - 领取奖励时选择服务器"
    structure:
      - "mobile: slide-up from bottom"
      - "desktop: centered fade-in"
      - "glass background"
      - "custom select input"
      - "disabled CTA until selection"
      
  poster:
    description: "分享海报 - 生成带邀请码的分享图片"
    structure:
      - "game background image"
      - "random message template"
      - "invite code display"
      - "QR code placeholder"
      - "save button (gold gradient)"

# ============================================
# 9. 禁忌 / Anti-patterns
# ============================================
anti_patterns:
  - "不要使用浅色背景 (与游戏氛围冲突)"
  - "不要使用直角按钮 (与有机主题冲突)"
  - "不要使用 emoji 作为图标"
  - "不要使用低于 4.5:1 的对比度"
  - "不要省略文字阴影 (在复杂背景上必须加)"
  - "不要使用非游戏风格的字体 (如 Comic Sans)"
  - "不要使用蓝色作为主色调 (与丛林主题冲突)"
  - "不要使用白色卡片背景 (破坏沉浸感)"

# ============================================
# 10. 快速开始 / Quick Start
# ============================================
quick_start:
  step_1: "复制配色方案到 Tailwind config"
  step_2: "引入字体: Cinzel + Inter + JetBrains Mono"
  step_3: "设置背景: 丛林图片 + 深色渐变叠加"
  step_4: "使用 glass card 作为容器"
  step_5: "使用 gold gradient 作为主按钮"
  step_6: "添加文字阴影确保可读性"
  
# ============================================
# 11. 参考资源 / References
# ============================================
references:
  demo_page: "projects/001-growNewUsers/001-01-referral-activity/frontend/invite-dashboard.html"
  background_image: "banner-BSZ_6Ncr.png"
  config_example: "projects/001-growNewUsers/001-01-referral-activity/frontend/config/messages.json"
  
# ============================================
# 12. 更新日志 / Changelog
# ============================================
