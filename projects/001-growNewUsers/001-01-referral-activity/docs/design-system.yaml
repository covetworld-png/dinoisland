# Dinosaur Island - Design System v1.0
# 恐龙岛设计系统 v1.0
# 
# 引用路径: [引用:projects/001-growNewUsers/001-01-referral-activity/docs/design-system.yaml]
# 适用范围: 游戏内活动页面、H5 推广页、邀请系统

metadata:
  name: "Dinosaur Island Design System"
  nameCN: "恐龙岛设计系统"
  version: "1.0.0"
  created: "2026-03-13"
  scope: 
    - "in-game activity pages"
    - "H5 promotional pages"
    - "referral systems"
    - "reward dashboards"
  
# ============================================
# 1. 视觉风格 / Visual Style
# ============================================
visual_style:
  theme: "Prehistoric Jungle Gaming"
  themeCN: "史前丛林游戏风"
  keywords:
    - "adventurous"
    - "mysterious"
    - "immersive"
    - "rewarding"
    - "prehistoric atmosphere"
  
  # 背景设置 / Background
  background:
    type: "image"
    image: "banner-BSZ_6Ncr.png"
    description: "霸王龙在雾气弥漫的丛林中，青绿色调"
    overlay: "dark gradient from jungle-900"
    attachment: "fixed"
    
  # 玻璃态卡片 / Glassmorphism Cards
  cards:
    style: "glass"
    background: "rgba(10, 30, 25, 0.85)"
    backdrop_blur: "12px"
    border: "1px solid rgba(74, 154, 138, 0.2)"
    border_radius: "12-16px"
    shadow: "0 8px 25px rgba(0, 0, 0, 0.4)"
    
  # 装饰元素 / Decorative Elements
  decorations:
    pattern: "subtle dinosaur/palm leaf texture"
    pattern_opacity: "5%"
    glow_effects: "gold glow for rewards and CTAs"

# ============================================
# 2. 配色方案 / Color Palette
# ============================================
colors:
  # 主色调 / Primary
  primary:
    gold:
      DEFAULT: "#FFD700"
      dark: "#B8860B"
      light: "#FFE55C"
      usage: "rewards, coins, CTAs, active states"
    
  # 丛林色系 / Jungle Theme
  jungle:
    900: "#0a1a15"    # 最深背景
    800: "rgba(10, 30, 25, 0.85)"  # 卡片背景
    700: "rgba(15, 45, 38, 0.9)"   # 悬停状态
    600: "#1a4a3a"    # 强调色
    500: "rgba(30, 80, 65, 0.6)"   # 边框
    
  # 雾气色系 / Mist Accent
  mist:
    DEFAULT: "#4a9a8a"
    light: "#6abaaa"
    dark: "#2a6a5a"
    usage: "secondary elements, borders, highlights"
    
  # 状态色 / Status
  status:
    success: "#10b981"    # 已激活、完成
    warning: "#f59e0b"    # 待激活、处理中
    error: "#ef4444"      # 失败、未激活
    info: "#3b82f6"       # 提示、链接
    
  # 文字色 / Text
  text:
    primary: "#f1f5f9"    # 主文字 - slate-100
    secondary: "#94a3b8"  # 次要文字 - slate-400
    muted: "#64748b"      # 禁用状态 - slate-500
    
  # 对比度要求 / Contrast Requirements
  contrast:
    minimum: "4.5:1"
    current: "15.8:1"  # gold on jungle-900

# ============================================
# 3. 字体排版 / Typography
# ============================================
typography:
  # 字体家族 / Font Families
  families:
    display: 
      name: "Cinzel"
      usage: "headings, titles, brand text"
      fallback: "serif"
    body:
      name: "Inter"
      usage: "body text, UI elements"
      fallback: "sans-serif"
    mono:
      name: "JetBrains Mono"
      usage: "invite codes, numbers"
      fallback: "monospace"
      
  # 标题样式 / Headings
  headings:
    h1: 
      size: "24-30px"
      weight: "700"
      font: "Cinzel"
      shadow: "0 2px 4px rgba(0,0,0,0.8)"
    h2:
      size: "18-20px"
      weight: "600"
      font: "Inter"
    h3:
      size: "16-18px"
      weight: "600"
      font: "Inter"
      
  # 正文 / Body
  body:
    size: "14-15px"
    weight: "400-500"
    line_height: "1.5-1.75"
    
  # 特殊文字 / Special Text
  special:
    invite_code:
      font: "JetBrains Mono"
      letter_spacing: "3px"
      size: "20-24px"
      color: "gold"
    numbers:
      font: "Cinzel"
      weight: "700"
      color: "gold"

# ============================================
# 4. 组件规范 / Components
# ============================================
components:
  # 按钮 / Buttons
  buttons:
    primary:
      background: "gradient from-gold to-gold-dark"
      text: "#0a1a15"  # dark for contrast
      height: "48-56px"
      radius: "24px (pill)"
      shadow: "gold-button-glow"
      hover: "brightness-110"
      active: "scale-0.98"
      
    secondary:
      background: "transparent"
      border: "2px solid gold"
      text: "gold"
      hover: "bg-gold/10"
      
  # 输入框 / Inputs
  inputs:
    select:
      background: "jungle-700"
      border: "1px solid mist/30"
      radius: "12px"
      height: "48px"
      arrow: "gold chevron"
      
  # 标签 / Badges
  badges:
    activated:
      bg: "emerald-500/20"
      text: "emerald-400"
      dot: "emerald-400"
    pending:
      bg: "amber-500/20"
      text: "amber-400"
      dot: "amber-400"
    reward:
      bg: "gold/20"
      text: "gold"
      
  # 头像 / Avatars
  avatars:
    style: "icon-based"
    icon: "fas fa-user"
    background: "gradient"
    colors: ["emerald", "amber", "slate", "stone"]
    size: "40-48px"
    radius: "full"

# ============================================
# 5. 布局规范 / Layout
# ============================================
layout:
  # 容器 / Container
  container:
    max_width: "1200px"
    padding: "16px (mobile) / 24px (desktop)"
    
  # 网格 / Grid
  grid:
    desktop: "420px + 1fr (sidebar + content)"
    tablet: "1fr 1fr"
    mobile: "1fr (stacked)"
    
  # 间距 / Spacing
  spacing:
    section_gap: "16-24px"
    card_padding: "16-20px"
    element_gap: "12px"
    
  # 响应式断点 / Breakpoints
  breakpoints:
    mobile: "< 768px"
    tablet: "768px - 1024px"
    desktop: "> 1024px"

# ============================================
# 6. 动效规范 / Animations
# ============================================
animations:
  # 微交互 / Micro-interactions
  buttons:
    hover: "translateY(-2px), shadow enhancement"
    active: "scale(0.98), 150ms ease"
    transition: "all 0.25s ease"
    
  # 卡片 / Cards
  cards:
    hover: "translateY(-2px), shadow-lg"
    transition: "all 0.25s ease"
    
  # 模态框 / Modals
  modals:
    mobile: "slide-up from bottom"
    desktop: "fade-in center"
    duration: "300ms"
    easing: "ease-out"
    
  # 特殊效果 / Special Effects
  gold_glow:
    text_shadow: "0 0 20px rgba(255,215,0,0.5)"
    box_shadow: "0 4px 20px rgba(255,215,0,0.3)"
    
  float:
    animation: "float 3s ease-in-out infinite"
    transform: "translateY(-5px)"

# ============================================
# 7. 文案规范 / Copywriting
# ============================================
copywriting:
  # 默认语言 / Default Language
  default_language: "vi (Vietnamese)"
  supported_languages: ["vi", "cn"]
  
  # 语气 / Tone
  tone:
    vi: "thân thiện, hào hứng, khuyến khích"
    cn: "友好、热情、鼓励性"
    en: "friendly, enthusiastic, encouraging"
    
  # 关键术语 / Key Terms
  terms:
    invite_code:
      vi: "Mã mời"
      cn: "邀请码"
    reward:
      vi: "Thưởng"
      cn: "奖励"
    gold:
      vi: "vàng"
      cn: "金币"
    activated:
      vi: "Đã kích hoạt"
      cn: "已激活"
    pending:
      vi: "Chờ kích hoạt"
      cn: "待激活"
      
  # 话术模板 / Message Templates
  message_templates:
    structure: "enthusiastic + benefit + call-to-action"
    variables: ["{{code}}", "{{reward}}"]
    example_vi: "Nhanh tay tham gia Đảo Khủng Long! Dùng mã mời {{code}} đăng ký, cả hai đều nhận {{reward}}!"
    example_cn: "快来加入恐龙世界！用我的邀请码 {{code}} 注册，双方都能获得{{reward}}！"

# ============================================
# 8. 使用示例 / Usage Examples
# ============================================
examples:
  hero_card:
    description: "金币统计卡片"
    structure:
      - "glass card with gradient background"
      - "gold numbers with glow effect"
      - "primary CTA button (pill shape)"
      
  player_list:
    description: "邀请好友列表"
    structure:
      - "glass card container"
      - "user icon avatars"
      - "status badges (emerald/amber)"
      - "gold reward text"
      
  modal:
    description: "服务器选择弹窗"
    structure:
      - "mobile: slide-up from bottom"
      - "desktop: centered fade-in"
      - "glass background"
      - "custom select input"

# ============================================
# 9. 禁忌 / Anti-patterns
# ============================================
anti_patterns:
  - "不要使用浅色背景 (与游戏氛围冲突)"
  - "不要使用直角按钮 (与有机主题冲突)"
  - "不要使用 emoji 作为图标"
  - "不要使用低于 4.5:1 的对比度"
  - "不要省略文字阴影 (在复杂背景上)"
  - "不要使用非游戏风格的字体"

# ============================================
# 10. 参考资源 / References
# ============================================
references:
  background_image: "banner-BSZ_6Ncr.png"
  demo_page: "invite-dashboard.html"
  config_file: "config/messages.json"
