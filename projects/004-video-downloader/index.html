<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内部视频库</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 登录层 -->
  <div id="login-layer" class="login-layer">
    <div class="login-box">
      <h2>🔐 内部视频库</h2>
      <p>请输入访问密码</p>
      <input type="password" id="password-input" placeholder="密码">
      <button id="login-btn" type="button">进入</button>
      <p id="login-error" class="error-msg"></p>
    </div>
  </div>

  <!-- 主内容 -->
  <div id="main-content" class="main-content hidden">
    <header class="header">
      <div class="header-left">
        <h1>🎬 内部视频库</h1>
        <span id="total-count" class="count-badge">0 个视频</span>
      </div>
      <button id="logout-btn" class="btn-secondary">退出</button>
    </header>

    <div class="filters">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="搜索标题、内容...">
      </div>
      <select id="type-filter">
        <option value="">全部类型</option>
      </select>
      <div class="view-toggle">
        <button id="view-card" class="view-btn active" title="卡片视图">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 3h7v7H3V3zm0 11h7v7H3v-7zm11-11h7v7h-7V3zm0 11h7v7h-7v-7z"/></svg>
        </button>
        <button id="view-list" class="view-btn" title="列表视图">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 4h18v2H3V4zm0 7h18v2H3v-2zm0 7h18v2H3v-2z"/></svg>
        </button>
      </div>
    </div>

    <!-- 批量操作栏 -->
    <div id="batch-bar" class="batch-bar hidden">
      <div class="batch-info">
        <input type="checkbox" id="select-all">
        <span>已选择 <strong id="selected-count">0</strong> 个视频</span>
      </div>
      <div class="batch-actions">
        <button id="batch-download" class="btn-primary" disabled>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          批量下载
        </button>
        <button id="clear-selection" class="btn-secondary">清空选择</button>
      </div>
    </div>

    <div id="video-grid" class="video-grid">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <!-- 视频播放弹层 -->
  <div id="video-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      
      <div class="video-player-wrapper">
        <video id="video-player" controls muted playsinline crossorigin="anonymous" preload="metadata">
          <source src="" type="video/mp4">
        </video>
        
        <!-- 加载状态 -->
        <div id="video-loading" class="video-status loading-state">
          <div class="spinner"></div>
          <p>视频加载中...</p>
        </div>
        
        <!-- 错误状态 -->
        <div id="video-error" class="video-status error-state hidden">
          <p>⚠️ 视频加载失败</p>
          <p class="error-detail">可能是网络问题或视频链接失效</p>
          <div class="error-actions">
            <button id="retry-btn" class="btn-primary">重新加载</button>
            <a id="open-newtab" href="#" target="_blank" class="btn-secondary">新标签页打开</a>
          </div>
        </div>
      </div>
      
      <div class="video-info">
        <h3 id="modal-title"></h3>
        <p id="modal-content"></p>
      </div>
    </div>
  </div>

  <script src="js/csv_data.js?v=6"></script>
  <script src="js/app.js?v=6"></script>
</body>
</html>
