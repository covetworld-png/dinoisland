<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="page.title">Đảo Khủng Long - Quà Tân Thủ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'GA_MEASUREMENT_ID');
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #FFD700;
            --gold-dark: #B8860B;
            --gold-light: #FFE55C;
            --jungle-900: #0a1a15;
            --jungle-800: rgba(10, 30, 25, 0.85);
            --jungle-700: rgba(15, 45, 38, 0.9);
            --jungle-600: #1a4a3a;
            --mist: #4a9a8a;
            --mist-light: #6abaaa;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--jungle-900);
            min-height: 100vh;
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;
        }

        /* Global background with dinosaur confrontation image */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                /* Top gradient for logo readability */
                linear-gradient(180deg, rgba(10, 26, 21, 0.85) 0%, rgba(10, 26, 21, 0.4) 30%, transparent 50%),
                /* Bottom gradient for content readability */
                linear-gradient(0deg, rgba(10, 26, 21, 0.95) 0%, rgba(10, 26, 21, 0.6) 40%, transparent 60%),
                /* Dinosaur confrontation background */
                url('../../assets/official/bg_dino_confront.png');
            background-size: 100% 100%, 100% 100%, cover;
            background-position: center top;
            background-repeat: no-repeat;
            z-index: -2;
        }

        /* Noise texture overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 16px 40px;
            position: relative;
        }

        /* Language Switcher */
        .lang-switcher {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 100;
            display: flex;
            gap: 8px;
            background: var(--jungle-800);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(74, 154, 138, 0.2);
            border-radius: 20px;
            padding: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .lang-btn {
            padding: 6px 12px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .lang-btn:hover {
            color: var(--text-primary);
        }

        .lang-btn.active {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--jungle-900);
        }

        /* Glass Card Style */
        .glass-card {
            background: var(--jungle-800);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(74, 154, 138, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            padding: 40px 0 24px;
        }

        .official-logo {
            width: 260px;
            height: auto;
            filter: brightness(1.3) contrast(1.1) drop-shadow(0 0 30px rgba(255, 215, 0, 0.35));
        }

        /* Hero Section */
        .hero-section {
            text-align: center;
            padding: 8px 0 16px;
        }

        .hero-title {
            font-family: 'Cinzel', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .hero-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* CTA Section */
        .cta-section {
            text-align: center;
            padding: 8px 0;
        }

        /* Primary Button */
        .btn-primary {
            width: 100%;
            padding: 18px 24px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            border: none;
            border-radius: 28px;
            color: var(--jungle-900);
            font-family: 'Inter', sans-serif;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
            transition: all 0.15s ease;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 215, 0, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary .icon {
            font-size: 20px;
        }

        .animate-pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 4px 30px rgba(255, 215, 0, 0.5); }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(74, 154, 138, 0.5), transparent);
        }

        /* Zalo Number Section */
        .zalo-number-section {
            text-align: center;
        }

        .zalo-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .zalo-number {
            font-family: 'Cinzel', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            margin-bottom: 12px;
        }

        /* Secondary Button */
        .btn-secondary {
            width: 100%;
            padding: 14px 24px;
            background: transparent;
            border: 2px solid var(--gold);
            border-radius: 28px;
            color: var(--gold);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.15s ease;
        }

        .btn-secondary:hover {
            background: rgba(255, 215, 0, 0.1);
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        /* Steps Section */
        .steps-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--mist-light);
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .steps {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(74, 154, 138, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(74, 154, 138, 0.15);
        }

        .step-number {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--mist) 0%, var(--jungle-600) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            flex-shrink: 0;
        }

        .step-content {
            flex: 1;
        }

        .step-content .text {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .step-arrow {
            color: var(--mist);
            font-size: 14px;
            opacity: 0.6;
        }

        /* Dinosaur Carousel */
        .carousel-section {
            padding: 8px 0;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            height: 280px;
            border-radius: 16px;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(15, 45, 38, 0.6) 0%, rgba(10, 30, 25, 0.8) 100%);
            border: 1px solid rgba(74, 154, 138, 0.2);
        }

        .carousel-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            padding: 20px;
        }

        .carousel-slide.active {
            opacity: 1;
        }

        .carousel-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.5));
        }

        .carousel-indicators {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .carousel-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .carousel-dot.active {
            background: var(--gold);
            width: 24px;
            border-radius: 4px;
        }

        /* Benefits Section */
        .benefits-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(74, 154, 138, 0.1);
        }

        .benefit-item:last-child {
            border-bottom: none;
        }

        .benefit-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--jungle-900);
            flex-shrink: 0;
        }

        .benefit-text {
            font-size: 15px;
            color: var(--text-primary);
            font-weight: 500;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--jungle-700);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(74, 154, 138, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 360px) {
            .container {
                padding: 16px 12px 32px;
            }

            .official-logo {
                width: 220px;
            }

            .hero-title {
                font-size: 22px;
            }

            .zalo-number {
                font-size: 22px;
            }

            .carousel-container {
                height: 240px;
            }
        }
    </style>
</head>
<body>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================
        // Internationalization
        // ============================================
        const i18n = {
            vi: {
                'page.title': 'Đảo Khủng Long - Quà Tân Thủ',
                'hero.title': '🎁 Tặng Khủng Long Khởi Đầu',
                'hero.subtitle': 'Quà chào mừng dành cho tân thủ',
                'cta.primary': 'Nhận quà ngay qua Zalo',
                'divider': 'hoặc',
                'zalo.label': 'Số Zalo',
                'cta.copy': 'Sao chép số Zalo',
                'steps.title': '📋 3 BƯỚC NHẬN QUÀ',
                'steps.step1': 'Kết bạn Zalo',
                'steps.step2': 'Nhắn tin "NHẬN LONG"',
                'steps.step3': 'Nhận khủng long hiếm',
                'benefit.rare': 'Khủng Long Hiếm Cấp S',
                'benefit.boost': 'Khởi đầu thuận lợi',
                'benefit.support': 'Hỗ trợ tận tình 24/7',
                'toast.copied': 'Đã sao chép!'
            },
            cn: {
                'page.title': '恐龙岛 - 新用户福利',
                'hero.title': '🎁 开局送恐龙',
                'hero.subtitle': '新玩家欢迎礼',
                'cta.primary': '通过 Zalo 立即领取',
                'divider': '或',
                'zalo.label': 'Zalo 号码',
                'cta.copy': '复制号码',
                'steps.title': '📋 3步领取',
                'steps.step1': '添加 Zalo 好友',
                'steps.step2': '发送消息"领龙"',
                'steps.step3': '领取稀有恐龙',
                'benefit.rare': 'S级稀有恐龙',
                'benefit.boost': '开局顺利',
                'benefit.support': '24小时贴心服务',
                'toast.copied': '已复制！'
            }
        };

        let currentLang = 'vi';

        function setLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    el.textContent = i18n[lang][key];
                }
            });

            document.title = i18n[lang]['page.title'];

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });

            localStorage.setItem('landing-official-lang', lang);
            
            // Analytics
            Analytics.track('language_switch', { from: currentLang === 'vi' ? 'cn' : 'vi', to: lang });
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                setLanguage(btn.dataset.lang);
            });
        });

        const savedLang = localStorage.getItem('landing-official-lang');
        if (savedLang && i18n[savedLang]) {
            setLanguage(savedLang);
        }

        // ============================================
        // Analytics Module
        // ============================================
        const Analytics = {
            init() {
                this.trackPageView();
                this.trackScrollDepth();
            },

            track(event, params = {}) {
                const baseParams = {
                    page: 'landing-official',
                    lang: currentLang,
                    ref: this.getParam('ref') || 'organic',
                    timestamp: Date.now()
                };
                
                const finalParams = { ...baseParams, ...params };
                
                // GA4
                if (window.gtag) {
                    gtag('event', event, finalParams);
                }
                
                // Console log for debugging
                console.log('[Analytics]', event, finalParams);
            },

            trackPageView() {
                this.track('page_view', {
                    utm_source: this.getParam('utm_source'),
                    utm_campaign: this.getParam('utm_campaign'),
                    cid: this.getParam('cid')
                });
            },

            trackScrollDepth() {
                const depths = [25, 50, 75, 100];
                const tracked = new Set();
                
                window.addEventListener('scroll', throttle(() => {
                    const scrollPercent = Math.round(
                        (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100
                    );
                    
                    depths.forEach(depth => {
                        if (scrollPercent >= depth && !tracked.has(depth)) {
                            tracked.add(depth);
                            this.track('scroll_depth', { percent: depth });
                        }
                    });
                }, 500));
            },

            getParam(name) {
                return new URLSearchParams(window.location.search).get(name);
            }
        };

        function throttle(fn, wait) {
            let lastTime = 0;
            return function(...args) {
                const now = Date.now();
                if (now - lastTime >= wait) {
                    lastTime = now;
                    fn.apply(this, args);
                }
            };
        }

        // ============================================
        // Zalo Button Handler
        // ============================================
        const zaloBtn = document.getElementById('zaloBtn');
        const phone = '8618717777125';
        
        zaloBtn.addEventListener('click', function(e) {
            e.preventDefault();
            
            Analytics.track('cta_click', { type: 'zalo_primary', position: 'hero' });
            
            const isAndroid = /Android/i.test(navigator.userAgent);
            const isiOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            let finalUrl = '';
            
            if (isAndroid) {
                finalUrl = `intent://zalo.me/${phone}#Intent;scheme=https;package=com.zing.zalo;S.browser_fallback_url=https%3A%2F%2Fzalo.me%2F${phone};end`;
            } else {
                finalUrl = `https://zalo.me/${phone}`;
            }
            
            window.location.href = finalUrl;
            
            // Track app open attempt
            setTimeout(() => {
                Analytics.track('zalo_app_open', { 
                    platform: isAndroid ? 'android' : (isiOS ? 'ios' : 'other')
                });
            }, 1000);
        });

        // ============================================
        // Copy Zalo Number
        // ============================================
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');
        const zaloNumber = '8618717777125';

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        copyBtn.addEventListener('click', async function() {
            try {
                await navigator.clipboard.writeText(zaloNumber);
                showToast(i18n[currentLang]['toast.copied']);
                Analytics.track('copy_number', { method: 'button' });
            } catch (err) {
                const textArea = document.createElement('textarea');
                textArea.value = zaloNumber;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast(i18n[currentLang]['toast.copied']);
                Analytics.track('copy_number', { method: 'button_fallback' });
            }
        });

        // ============================================
        // Dinosaur Carousel
        // ============================================
        const carousel = {
            container: document.getElementById('carousel'),
            slides: document.querySelectorAll('.carousel-slide'),
            dots: document.querySelectorAll('.carousel-dot'),
            currentIndex: 0,
            interval: null,
            touchStartX: 0,
            touchEndX: 0,

            init() {
                this.startAutoPlay();
                this.bindEvents();
            },

            bindEvents() {
                // Dot indicators
                this.dots.forEach((dot, index) => {
                    dot.addEventListener('click', () => {
                        this.goToSlide(index);
                        this.resetAutoPlay();
                    });
                });

                // Touch swipe support
                this.container.addEventListener('touchstart', (e) => {
                    this.touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });

                this.container.addEventListener('touchend', (e) => {
                    this.touchEndX = e.changedTouches[0].screenX;
                    this.handleSwipe();
                }, { passive: true });

                // Pause on hover
                this.container.addEventListener('mouseenter', () => {
                    clearInterval(this.interval);
                });

                this.container.addEventListener('mouseleave', () => {
                    this.startAutoPlay();
                });
            },

            handleSwipe() {
                const swipeThreshold = 50;
                const diff = this.touchStartX - this.touchEndX;

                if (Math.abs(diff) > swipeThreshold) {
                    if (diff > 0) {
                        // Swipe left - next slide
                        this.nextSlide();
                    } else {
                        // Swipe right - previous slide
                        this.prevSlide();
                    }
                    this.resetAutoPlay();
                }
            },

            goToSlide(index) {
                this.slides[this.currentIndex].classList.remove('active');
                this.dots[this.currentIndex].classList.remove('active');
                
                this.currentIndex = index;
                
                this.slides[this.currentIndex].classList.add('active');
                this.dots[this.currentIndex].classList.add('active');
            },

            nextSlide() {
                const nextIndex = (this.currentIndex + 1) % this.slides.length;
                this.goToSlide(nextIndex);
            },

            prevSlide() {
                const prevIndex = (this.currentIndex - 1 + this.slides.length) % this.slides.length;
                this.goToSlide(prevIndex);
            },

            startAutoPlay() {
                this.interval = setInterval(() => this.nextSlide(), 4000);
            },

            resetAutoPlay() {
                clearInterval(this.interval);
                this.startAutoPlay();
            }
        };

        // ============================================
        // Initialize
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            Analytics.init();
            carousel.init();
        });
    </script>
</body>
</html>
