<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zalo 唤起修复版</title>
    <style>
        .chat-btn {
            background: #0084FF; color: white; padding: 15px 25px;
            border-radius: 10px; text-decoration: none; display: inline-block;
            font-weight: bold; margin: 20px;
        }
    </style>
</head>
<body>

    <button onclick="openZaloChat('8490xxxxxx')" class="chat-btn">直接私聊 (个人)</button>

    <button onclick="openZaloOA('2468458835296197922')" class="chat-btn">联系客服 (OA)</button>

    <script>
        function openZaloChat(phone) {
            // 尝试直接使用私有协议跳转到拨号/搜索界面，或直接对话
            // 注意：部分 Android 版本对私有协议有严格限制
            const scheme = `zalo://qr/p/${phone}`; 
            const webUrl = `https://zalo.me/${phone}`;

            // 尝试执行私有协议
            window.location.href = scheme;

            // 延时检测：如果 2秒后页面没跳走，说明协议失效，切换到网页版引导
            setTimeout(() => {
                if (!document.hidden) {
                    window.location.href = webUrl;
                }
            }, 2000);
        }

        function openZaloOA(oaId) {
            // OA 的跳转通常非常稳定
            window.location.href = `https://zalo.me/${oaId}`;
        }
    </script>
</body>
</html>
